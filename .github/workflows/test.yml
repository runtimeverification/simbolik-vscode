name: 'Test'
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: 'Test'
    runs-on: ubuntu-latest
    steps:
      - name: 'Check out code'
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: 'Install nodejs 20'
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: 'Build and test'
        run: |
          npm install
          npm run lint
          npm run compile
          npm run compile-web
